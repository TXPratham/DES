<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Farm Update</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="global-translate.js"></script>
</head>
<body class="bg-[#f5f7f3] text-earthy antialiased font-sans pb-10">
    <div class="max-w-4xl mx-auto p-8 mt-10 relative z-10">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-mulberry text-white flex items-center justify-center shadow-md shadow-mulberry/30">
                    <i class="ph ph-note-pencil text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-mulberry-dark">Daily Farm Update</h1>
                    <p class="text-sm font-medium text-gray-500">Record manual entries for your active rearing batch.</p>
                </div>
            </div>
            <a href="farmer-home.html" class="hidden sm:flex px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-lg text-sm font-bold shadow-sm hover:text-mulberry transition-colors items-center gap-2">
                <i class="ph ph-squares-four text-lg"></i> Dashboard
            </a>
        </div>

        <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-sm border border-gray-100 relative">
            <form onsubmit="event.preventDefault(); showSuccessModal();" class="space-y-8">
                
                <!-- Section 1: Basic Info -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-info text-silkgold"></i> Batch Details
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Date</label>
                            <input type="date" id="logDate" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Active Batch ID</label>
                            <select class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                                <option>Batch #402 (Current)</option>
                                <option>Batch #401 (Completed)</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Current Rearing Stage</label>
                            <div class="grid grid-cols-2 md:grid-cols-6 gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="1">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">1st Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="2">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">2nd Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="3">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">3rd Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="4" checked>
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">4th Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="5">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">5th Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="spin">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">Spinning</div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Environment & Feed -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-thermometer text-blue-500"></i> Conditions & Feeding
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Indoor Temp (°C)</label>
                            <input type="number" step="0.1" placeholder="e.g. 26.5" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Indoor Humidity (%)</label>
                            <input type="number" placeholder="e.g. 75" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Leaf Fed Today (kg)</label>
                            <input type="number" placeholder="e.g. 120" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Operations -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-broom text-green-500"></i> Operations
                    </h3>
                    <div class="flex flex-col gap-4">
                        <label class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:border-mulberry transition-colors">
                            <div>
                                <h4 class="font-bold text-gray-800">Bed Cleaning Performed</h4>
                                <p class="text-xs text-gray-500 font-medium">Was the rearing bed cleaned today?</p>
                            </div>
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-mulberry"></div>
                            </div>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:border-mulberry transition-colors">
                            <div>
                                <h4 class="font-bold text-gray-800">Disinfectant Applied</h4>
                                <p class="text-xs text-gray-500 font-medium">Was Vijetha or bleaching powder applied?</p>
                            </div>
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-mulberry"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Section 4: Notes & Observations -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-warning-circle text-orange-500"></i> Notes & Health Observations
                    </h3>
                    <textarea rows="4" placeholder="Mention any dead worms, unusual behavior, or specific actions taken today..." class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-medium rounded-xl focus:ring-mulberry focus:border-mulberry block p-4 outline-none"></textarea>
                </div>

                <!-- Submit -->
                <div class="pt-6 border-t border-gray-100 flex justify-end">
                    <button type="submit" class="px-8 py-4 bg-mulberry text-white rounded-xl font-bold shadow-lg shadow-mulberry/30 hover:bg-mulberry-dark hover:-translate-y-1 transition-all flex items-center gap-2">
                        <i class="ph ph-floppy-disk text-xl"></i> Save Daily Log
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 text-green-500">
                <i class="ph ph-check-circle text-5xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800 mb-2">Log Saved!</h2>
            <p class="text-gray-500 font-medium mb-8">Your farm data for today has been recorded successfully.</p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-xl transition-colors">Return to Dashboard</button>
        </div>
    </div>

    <script>
        // Set today's date automatically
        document.getElementById('logDate').valueAsDate = new Date();

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const content = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            // small delay to allow display block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            window.location.href = 'farmer-home.html';
        }
    </script>
</body>
</html>
